[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Configure secrets scanning to ignore public env vars and documentation
  SECRETS_SCAN_OMIT_PATHS = "SEO_IMPLEMENTATION_GUIDE.md,.gitignore"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_BUSINESS_EMAIL,NEXT_PUBLIC_SITE_URL"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"