[build]
  command = "NETLIFY_SKIP_SECRET_DETECTION=true npm run build"
  publish = ".next"

[build.environment]
  NETLIFY_SKIP_SECRET_DETECTION = "true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"